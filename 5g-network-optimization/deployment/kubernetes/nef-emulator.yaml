apiVersion: v1
kind: ConfigMap
metadata:
  name: nef-emulator-config
data:
  SERVER_NAME: "nef-emulator"
  SERVER_HOST: "http://nef-emulator:8080"
  A3_HYSTERESIS_DB: "2.0"
  A3_TTT_S: "0.0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nef-emulator
  labels:
    app: nef-emulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nef-emulator
  template:
    metadata:
      labels:
        app: nef-emulator
    spec:
      containers:
      - name: nef-emulator
        image: 5g-network-optimization/nef-emulator:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: SERVER_NAME
          valueFrom:
            configMapKeyRef:
              name: nef-emulator-config
              key: SERVER_NAME
        - name: SERVER_HOST
          valueFrom:
            configMapKeyRef:
              name: nef-emulator-config
              key: SERVER_HOST
        - name: A3_HYSTERESIS_DB
          valueFrom:
            configMapKeyRef:
              name: nef-emulator-config
              key: A3_HYSTERESIS_DB
        - name: A3_TTT_S
          valueFrom:
            configMapKeyRef:
              name: nef-emulator-config
              key: A3_TTT_S
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: nef-emulator-secrets
              key: SECRET_KEY
        - name: FIRST_SUPERUSER
          valueFrom:
            secretKeyRef:
              name: nef-emulator-secrets
              key: FIRST_SUPERUSER
        - name: FIRST_SUPERUSER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nef-emulator-secrets
              key: FIRST_SUPERUSER_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: nef-emulator
spec:
  selector:
    app: nef-emulator
  ports:
  - port: 8080
    targetPort: 80
  type: ClusterIP
