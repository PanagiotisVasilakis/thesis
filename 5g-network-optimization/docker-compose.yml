services:
  db:
    image: postgres:12
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    networks:
      - 5g-network

  mongo_nef:
    image: mongo:4.4.10
    restart: always
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD}"
    volumes:
      - mongo-data:/data/db
    networks:
      - 5g-network

  nef-emulator:
    image: 5g-network-optimization/nef-emulator:latest
    build:
      context: ./services/nef-emulator/backend
      dockerfile: Dockerfile.backend
      args:
        ML_LOCAL: ${ML_LOCAL:-0}
    command: /start-reload.sh
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      - SERVER_NAME=${SERVER_NAME:?SERVER_NAME must be set}
      - SERVER_HOST=${SERVER_HOST:?SERVER_HOST must be set}
      - PYTHONPATH=/app:/opt/handover-baseline-service
      - HANDOVER_BASELINE_SERVICE_PATH=${HANDOVER_BASELINE_SERVICE_PATH:-/opt/handover-baseline-service}
      - TUNED_A3_CONFIG_PATH=${TUNED_A3_CONFIG_PATH:-}
      - A3_HYSTERESIS_DB=${A3_HYSTERESIS_DB:-2.0}
      - A3_TTT_S=${A3_TTT_S:-0.0}
      - ML_HANDOVER_ENABLED=${ML_HANDOVER_ENABLED:-1}
      - ML_LOCAL=${ML_LOCAL:-0}
    volumes:
      - ./services/handover-baseline-service:/opt/handover-baseline-service:ro
    networks:
      - 5g-network
    depends_on:
      - db
      - mongo_nef
  
  ml-service:
    image: 5g-network-optimization/ml-service:latest
    profiles:
      - "ml"
    build:
      context: ./services/ml-service
      dockerfile: Dockerfile
    ports:
      - "5050:5050"
    env_file:
      - .env
    environment:
      - NEF_API_URL=${NEF_API_URL:-http://nef-emulator:80}
      - A3_HYSTERESIS_DB=${A3_HYSTERESIS_DB:-2.0}
      - A3_TTT_S=${A3_TTT_S:-0.0}
      - RATELIMIT_PREDICT=${RATELIMIT_PREDICT:-3000 per minute}
      - RATELIMIT_FEEDBACK=${RATELIMIT_FEEDBACK:-3000 per minute}
      - MODEL_PATH=${MODEL_PATH:-}
      - FEATURE_CONFIG_PATH=${FEATURE_CONFIG_PATH:-}
      - THESIS_FINAL_RUN=${THESIS_FINAL_RUN:-0}
      - REQUIRE_PRETRAINED_MODEL=${REQUIRE_PRETRAINED_MODEL:-0}
      - DISABLE_SYNTHETIC_MODEL_BOOTSTRAP=${DISABLE_SYNTHETIC_MODEL_BOOTSTRAP:-0}
    volumes:
      - ${ML_MODEL_HOST_DIR:-./services/ml-service/ml_service/app/models}:/app/final-models:ro
    depends_on:
      - nef-emulator
    networks:
      - 5g-network
  
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - nef-emulator
    networks:
      - 5g-network
  
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set}
    depends_on:
      - prometheus
    networks:
      - 5g-network

  kinisis_ui:
    image: 5g-network-optimization/kinisis-ui:latest
    build:
      context: ./services/kinisis_ui
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=/api/v1
      - NGINX_API_UPSTREAM=${NGINX_API_UPSTREAM:-http://nef-emulator:80}
    depends_on:
      - nef-emulator
    networks:
      - 5g-network

networks:
  5g-network:
    driver: bridge

volumes:
  db-data:
  mongo-data:
