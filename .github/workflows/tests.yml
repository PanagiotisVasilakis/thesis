name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhdf5-dev \
            libffi-dev \
            libcairo2 \
            libpango-1.0-0 \
            libjpeg-dev \
            git

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e 5g-network-optimization/services/ml-service
          python -m pip install flake8

      - name: Critical lint gate
        run: |
          python -m flake8 \
            5g-network-optimization scripts tests mlops \
            --select=F821,F811,F841,F401,F403,F405,F541,E9 \
            --show-source --statistics

      - name: Collect tests
        run: |
          python -m pytest --collect-only -q

      - name: Run tests
        run: |
          mkdir -p CI-CD_reports
          python -m pytest --cov | tee CI-CD_reports/coverage_${{ github.run_number }}.txt
